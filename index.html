            document.getElementById('page-title').textContent = '就餐考勤实时上报';
            
            // 获取所有可能的餐段名称
            const allPossibleSessions = Array.from(new Set([...daySessions, ...residentSessions].map(s => JSON.stringify({id: s.id, name: s.name}))))
                                            .map(s => JSON.parse(s));

            document.getElementById('header-actions').innerHTML = `
                <div class="flex items-center space-x-3 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm">
                    <input type="date" id="report-date-input" value="${selectedDate}" min="${tomorrowStr}" class="font-black text-sm px-4 py-2 rounded-xl border-none outline-none ${isHistorical ? 'text-rose-500' : ''}">
                    <div class="w-px h-6 bg-gray-100"></div>
                    <select id="report-meal-input" class="font-black text-sm px-4 py-2 rounded-xl border-none outline-none bg-transparent">
                        ${allPossibleSessions.map(s => `<option value="${s.id}" ${s.id == mealId ? 'selected' : ''}>${s.name}</option>`).join('')}
                    </select>
                </div>
            `;

            const renderStudentList = (studentList, genderLabel, bgColor) => `
                <div class="card overflow-hidden">
                    <div class="px-8 py-5 border-b ${bgColor} font-black flex justify-between items-center">
                        <span>${genderLabel} (${studentList.length}人)</span>
                        ${!isReadOnly ? `
                            <div class="flex space-x-2">
                                <button data-action="handleBatchLeave" data-date="${selectedDate}" data-meal="${mealId}" data-gender="${genderLabel.includes('男') ? 'male' : 'female'}" data-type="leave" class="text-[10px] bg-white/50 px-3 py-1 rounded-lg hover:bg-white transition-colors">全员请假</button>
                                <button data-action="handleBatchLeave" data-date="${selectedDate}" data-meal="${mealId}" data-gender="${genderLabel.includes('男') ? 'male' : 'female'}" data-type="clear" class="text-[10px] bg-white/50 px-3 py-1 rounded-lg hover:bg-white transition-colors text-rose-600">重置正常</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto">
                        ${studentList.length === 0 ? '<div class="p-8 text-center text-gray-400 font-bold">本班无该性别学生</div>' : studentList.map(s => {
                            const r = records.find(rec => rec.studentId === s.id);
                            const isLeave = r && r.statusId !== 1;
                            
                            // 根据学生类型判断该餐段是否需要上报
                            let isMealActive = false;
                            if (s.studentType === 'resident') {
                                isMealActive = residentSessions.some(ss => ss.id === parseInt(mealId));
                            } else if (s.studentType === 'custom') {
                                isMealActive = s.customMeals && s.customMeals[mealId];
                            } else {
                                isMealActive = daySessions.some(ss => ss.id === parseInt(mealId));
                            }

                            if (!isMealActive) {
                                return `
                                    <div class="px-8 py-5 flex items-center justify-between opacity-40 bg-gray-50/50">
                                        <div class="flex-1">
                                            <div class="font-black text-gray-400">${s.name} <span class="text-[10px] ml-2">${s.studentType === 'resident' ? '住宿' : s.studentType === 'custom' ? '自定义' : '走读'}</span></div>
                                            <div class="text-[10px] font-bold mt-1">该类型学生此餐段无需就餐</div>
                                        </div>
                                        <div class="px-4 py-2 rounded-xl font-black text-xs bg-gray-100 text-gray-400 border border-gray-200 cursor-not-allowed">
                                            无需上报
                                        </div>
                                    </div>
                                `;
                            }

                            return `
                                <div class="px-8 py-5 flex items-center justify-between hover:bg-gray-50 transition-colors">
                                    <div class="flex-1 pointer-events-none">
                                        <div class="font-black text-gray-900">${s.name} 
                                            <span class="text-[10px] text-gray-400 font-mono ml-2">${s.studentNo}</span>
                                            <span class="ml-2 text-[10px] font-black ${s.studentType === 'resident' ? 'text-indigo-500' : s.studentType === 'custom' ? 'text-purple-500' : 'text-amber-500'}">[${s.studentType === 'resident' ? '住宿' : s.studentType === 'custom' ? '自定义' : '走读'}]</span>
                                        </div>
                                        ${isLeave && r.reason ? `<div class="text-[10px] text-rose-500 font-bold mt-1">理由：${r.reason}</div>` : ''}
                                    </div>
                                    <button 
                                        data-action="toggleMealStatus"
                                        data-sid="${s.id}"
                                        data-date="${selectedDate}"
                                        data-meal="${mealId}"
                                        data-leave="${isLeave}"
                                        ${isReadOnly ? 'disabled' : ''}
                                        class="flex items-center space-x-2 px-4 py-2 rounded-xl font-black text-xs transition-all ${isLeave ? 'bg-rose-50 text-rose-600 border border-rose-100' : 'bg-green-50 text-green-600 border border-green-100'} ${isReadOnly ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105'}">
                                        <i data-lucide="${isLeave ? 'x-circle' : 'check-circle'}" class="w-4 h-4 pointer-events-none"></i>
                                        <span class="pointer-events-none">${isLeave ? '请假' : '正常'}</span>
                                    </button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;

            document.getElementById('content-area').innerHTML = `
                <div class="space-y-8 pb-32">
                    ${isHistorical ? `
                        <div class="bg-amber-50 border border-amber-100 p-6 rounded-2xl flex items-start space-x-4 animate-in slide-in-from-top-4">
                            <i data-lucide="info" class="text-amber-600 w-6 h-6 mt-1"></i>
                            <div>
                                <h4 class="font-black text-amber-900">历史记录不可修改</h4>
                                <p class="text-sm text-amber-700 font-bold mt-1">当前查看的是过去或今日的就餐数据，仅供查询参考。</p>
                            </div>
                        </div>
                    ` : ''}

                    ${report && report.status === 'rejected' ? `
                        <div class="bg-rose-50 border border-rose-100 p-6 rounded-2xl flex items-start space-x-4 animate-in slide-in-from-top-4">
                            <i data-lucide="alert-circle" class="text-rose-600 w-6 h-6 mt-1"></i>
                            <div>
                                <h4 class="font-black text-rose-900">上报已被管理员驳回</h4>
                                <p class="text-sm text-rose-700 font-bold mt-1">原因：${report.rejectReason || '未填写'}</p>
                                <p class="text-[10px] text-rose-500 mt-2 font-bold">请根据驳回原因修改数据后重新上报。</p>
                            </div>
                        </div>
                    ` : ''}

                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                        ${renderStudentList(males, '男生名单', 'bg-blue-50/50 text-blue-900')}
                        ${renderStudentList(females, '女生名单', 'bg-rose-50/50 text-rose-900')}
                    </div>

                    <div class="fixed bottom-10 right-10 z-30 flex items-center space-x-4">
                        ${isReported ? `
                            <div class="flex items-center space-x-3 px-10 py-5 bg-gray-400 text-white rounded-3xl font-black text-lg shadow-2xl opacity-80 cursor-not-allowed">
                                <i data-lucide="lock" class="w-6 h-6"></i>
                                <span>该日期数据已上报 (只读)</span>
                            </div>
                        ` : isHistorical ? `
                            <div class="flex items-center space-x-3 px-10 py-5 bg-amber-400 text-white rounded-3xl font-black text-lg shadow-2xl opacity-80 cursor-not-allowed">
                                <i data-lucide="calendar" class="w-6 h-6"></i>
                                <span>历史记录不可上报</span>
                            </div>
                        ` : `
                            <button data-action="handleManualReport" data-date="${selectedDate}" class="flex items-center space-x-3 px-10 py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-2xl shadow-indigo-200 hover:scale-105 transition-all">
                                <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                                <span>立即上报明日数据</span>
                            </button>
                        `}
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        const toggleMealStatus = async (studentId, date, mealId, isCurrentlyLeave) => {
            const students = await dbOp('students', 'readonly', s => s.getAll());
            const student = students.find(s => s.id === studentId);
            const prices = await dbOp('configs', 'readonly', s => s.get('meal_prices'));
            const basePrice = (student.gender === 'male' ? prices.male : prices.female)[mealId] || 0;

            if (isCurrentlyLeave) {
                // 切换为正常
                const allRecs = await dbOp('records', 'readonly', s => s.getAll());
                const existing = allRecs.find(r => r.date === date && r.mealId === parseInt(mealId) && r.studentId === studentId);
                if (existing) {
                    await dbOp('records', 'readwrite', s => s.delete(existing.id));
                }
                showToast(`已恢复 ${student.name} 为正常就餐`);
            } else {
                // 切换为请假
                const reason = prompt(`请输入 ${student.name} 的请假理由 (选填):`);
                if (reason === null) return; // 取消操作

                const allRecs = await dbOp('records', 'readonly', s => s.getAll());
                const existing = allRecs.find(r => r.date === date && r.mealId === parseInt(mealId) && r.studentId === studentId);
                
                const record = {
                    studentId,
                    classId: currentUser.classId,
                    date,
                    mealId: parseInt(mealId),
                    statusId: 2, // 请假
                    cost: 0, // 请假不扣费 (根据用户新逻辑：请假则不计入实到)
                    isAttendance: false,
                    reason: reason.trim() || ''
                };

                if (existing) record.id = existing.id;
                await dbOp('records', 'readwrite', s => s.put(record));
                showToast(`已标记 ${student.name} 为请假状态`);
            }
            renderTeacherReport(date, mealId);
        };

        const handleBatchLeave = async (date, mealId, gender, batchType = 'leave') => {
            const isClear = batchType === 'clear';
            const actionText = isClear ? '重置为正常就餐' : '设为请假';
            if (!confirm(`确定要将本班所有${gender === 'male' ? '男生' : '女生'}${actionText}吗？`)) return;
            
            const clsId = currentUser.classId;
            const students = await dbOp('students', 'readonly', s => s.index('classId').getAll(clsId));
            const targets = students.filter(s => s.gender === gender);
            const allRecs = await dbOp('records', 'readonly', s => s.getAll());

            for (const s of targets) {
                const existing = allRecs.find(r => r.date === date && r.mealId === parseInt(mealId) && r.studentId === s.id);
                
                if (isClear) {
                    if (existing) await dbOp('records', 'readwrite', st => st.delete(existing.id));
                } else {
                    const record = {
                        studentId: s.id,
                        classId: clsId,
                        date,
                        mealId: parseInt(mealId),
                        statusId: 2,
                        cost: 0,
                        isAttendance: false,
                        reason: '批量请假'
                    };
                    if (existing) record.id = existing.id;
                    await dbOp('records', 'readwrite', st => st.put(record));
                }
            }
            showToast(`已完成${gender === 'male' ? '男生' : '女生'}全员${actionText}设置`);
            renderTeacherReport(date, mealId);
        };

        const handleManualReport = async (date) => {
            const tomorrowObj = new Date();
            tomorrowObj.setDate(tomorrowObj.getDate() + 1);
            const tomorrowStr = tomorrowObj.toISOString().split('T')[0];

            if (date !== tomorrowStr) {
                return showToast('只能上报明天的就餐记录');
            }

            if (!confirm('确定要立即上报明日数据吗？上报后数据将锁定，无法再修改。')) return;

            const clsId = currentUser.classId;
            const students = await dbOp('students', 'readonly', s => s.index('classId').getAll(clsId));
            const activeStudents = students;
            const allRecords = await dbOp('records', 'readonly', s => s.getAll());
            const todayRecords = allRecords.filter(r => r.classId === clsId && r.date === date);
            
            const sessionsData = await dbOp('configs', 'readonly', s => s.get('meal_sessions'));
            const daySessions = (sessionsData?.day || []).filter(s => s.enabled);
            const residentSessions = (sessionsData?.resident || []).filter(s => s.enabled);
            const prices = await dbOp('configs', 'readonly', s => s.get('meal_prices'));

            // 1. 为所有未记录的学生补全“正常就餐”记录，以确保财务统计准确
            // 注意：现在需要根据学生类型来补全对应的餐段
            const allPossibleSessions = Array.from(new Set([...daySessions, ...residentSessions].map(s => JSON.stringify({id: s.id, name: s.name}))))
                                            .map(s => JSON.parse(s));

            for (const sess of allPossibleSessions) {
                for (const student of activeStudents) {
                    // 检查该学生类型是否包含此餐段
                    let isMealActive = false;
                    if (student.studentType === 'resident') {
                        isMealActive = residentSessions.some(ss => ss.id === sess.id);
                    } else if (student.studentType === 'custom') {
                        isMealActive = student.customMeals && student.customMeals[sess.id];
                    } else {
                        isMealActive = daySessions.some(ss => ss.id === sess.id);
                    }

                    if (!isMealActive) continue;

                    const existing = todayRecords.find(r => r.studentId === student.id && r.mealId === sess.id);
                    if (!existing) {
                        const basePrice = (student.gender === 'male' ? prices.male[sess.id] : prices.female[sess.id]) || 0;
                        await dbOp('records', 'readwrite', s => s.add({
                            studentId: student.id,
                            classId: clsId,
                            date,
                            mealId: sess.id,
                            statusId: 1, // 正常就餐
                            cost: basePrice,
                            isAttendance: true
                        }));
                    }
                }
            }

            // 重新获取补全后的记录用于聚合上报数据
            const updatedRecords = (await dbOp('records', 'readonly', s => s.getAll())).filter(r => r.classId === clsId && r.date === date);

            // 2. 聚合上报展示数据
            const leaveDetails = [];
            let totalLeaveCount = 0;

            for (const student of activeStudents) {
                const studentLeaves = updatedRecords.filter(r => r.studentId === student.id && r.statusId !== 1);
                if (studentLeaves.length > 0) {
                    leaveDetails.push({
                        id: student.id,
                        name: student.name,
                        studentNo: student.studentNo,
                        gender: student.gender,
                        meals: studentLeaves.map(r => {
                            const sess = allPossibleSessions.find(s => s.id === r.mealId);
                            return sess ? sess.name : '未知';
                        }),
                        reason: studentLeaves.map(r => r.reason).filter(Boolean).join('; ')
                    });
                    totalLeaveCount += studentLeaves.length;
                }
            }

            const totalCount = activeStudents.length;
            const report = {
                date,
                classId: clsId,
                totalCount: totalCount,
                leaveCount: totalLeaveCount,
                attendedCount: updatedRecords.filter(r => r.isAttendance).length,
                reportTime: new Date().toLocaleString(),
                status: 'reported',
                leaveDetails
            };

            const reports = await dbOp('reports', 'readonly', s => s.getAll());
            const existingReport = reports.find(r => r.date === date && r.classId === clsId);
            if (existingReport) report.id = existingReport.id;

            await dbOp('reports', 'readwrite', s => s.put(report));
            showToast('今日就餐数据已成功上报并锁定');
            renderTeacherReport(date);
        };

        const renderTeacherStudents = async () => {
            const clsId = currentUser.classId;
            const cls = await dbOp('classes', 'readonly', s => s.get(clsId));
            const students = await dbOp('students', 'readonly', s => s.index('classId').getAll(clsId));
            const males = students.filter(s => s.gender === 'male');
            const females = students.filter(s => s.gender === 'female');

            const getTypeName = (type) => {
                if (type === 'resident') return '住宿';
                if (type === 'custom') return '自定义';
                return '走读';
            };

            document.getElementById('page-title').textContent = `${cls.fullName || cls.name} 学生档案库`;
            document.getElementById('header-actions').innerHTML = `<button data-action="showAddStudentModal" data-cid="${clsId}" class="btn-blue px-6 py-3 rounded-xl font-black flex items-center shadow-lg shadow-blue-100"><i data-lucide="plus" class="w-5 h-5 mr-2"></i>添加学生</button>`;

            document.getElementById('content-area').innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                    <div class="card overflow-hidden">
                        <div class="px-8 py-5 border-b bg-blue-50/50 font-black text-blue-900">男生名单</div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]"><tr><th class="px-8 py-4">学号</th><th class="px-8 py-4">姓名</th><th class="px-8 py-4">类型</th><th class="px-8 py-4">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">${males.map(s => `<tr><td class="px-8 py-4 font-mono text-gray-500">${s.studentNo}</td><td class="px-8 py-4 font-black text-gray-900">${s.name}</td><td class="px-8 py-4"><span class="px-2 py-1 rounded-lg text-[10px] font-black ${s.studentType === 'resident' ? 'bg-indigo-100 text-indigo-700' : s.studentType === 'custom' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}">${getTypeName(s.studentType)}</span></td><td class="px-8 py-4"><button data-action="showEditStudentModal" data-id="${s.id}" class="text-blue-600 font-bold hover:underline mr-4">编辑</button><button data-action="deleteStudent" data-id="${s.id}" class="text-rose-600 font-bold hover:underline">删除</button></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                    <div class="card overflow-hidden">
                        <div class="px-8 py-5 border-b bg-rose-50/50 font-black text-rose-900">女生名单</div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]"><tr><th class="px-8 py-4">学号</th><th class="px-8 py-4">姓名</th><th class="px-8 py-4">类型</th><th class="px-8 py-4">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">${females.map(s => `<tr><td class="px-8 py-4 font-mono text-gray-500">${s.studentNo}</td><td class="px-8 py-4 font-black text-gray-900">${s.name}</td><td class="px-8 py-4"><span class="px-2 py-1 rounded-lg text-[10px] font-black ${s.studentType === 'resident' ? 'bg-indigo-100 text-indigo-700' : s.studentType === 'custom' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}">${getTypeName(s.studentType)}</span></td><td class="px-8 py-4"><button data-action="showEditStudentModal" data-id="${s.id}" class="text-blue-600 font-bold hover:underline mr-4">编辑</button><button data-action="deleteStudent" data-id="${s.id}" class="text-rose-600 font-bold hover:underline">删除</button></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        const renderTeacherRecords = async (month = new Date().toISOString().slice(0, 7)) => {
            const clsId = currentUser.classId;
            const allRecs = await dbOp('records', 'readonly', s => s.getAll());
            const records = allRecs.filter(r => r.classId === clsId && r.date.startsWith(month));
            const students = await dbOp('students', 'readonly', s => s.index('classId').getAll(clsId));

            document.getElementById('page-title').textContent = '班级月度考勤统计';
            document.getElementById('header-actions').innerHTML = `
                <div class="flex items-center space-x-3 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm">
                    <input type="month" id="records-month-input" value="${month}" class="font-black text-sm px-4 py-2 border-none outline-none">
                    <button data-action="exportCSV" data-type="teacher" data-month="${month}" class="btn-green px-5 py-2 rounded-xl text-xs font-black flex items-center shadow-md"><i data-lucide="download" class="w-4 h-4 mr-2"></i>导出报表</button>
                </div>
            `;

            const mR = records.filter(r => students.find(s => s.id === r.studentId)?.gender === 'male');
            const fR = records.filter(r => students.find(s => s.id === r.studentId)?.gender === 'female');

            document.getElementById('content-area').innerHTML = `
                <div class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="card p-8 bg-blue-50/50 border-blue-100"><div class="text-blue-600 text-[10px] font-black uppercase tracking-widest mb-2">男生本月累计费用</div><div class="text-4xl font-black text-blue-900">¥${mR.reduce((s, r) => s + r.cost, 0).toFixed(1)}</div></div>
                        <div class="card p-8 bg-rose-50/50 border-rose-100"><div class="text-rose-600 text-[10px] font-black uppercase tracking-widest mb-2">女生本月累计费用</div><div class="text-4xl font-black text-rose-900">¥${fR.reduce((s, r) => s + r.cost, 0).toFixed(1)}</div></div>
                    </div>
                    <div class="card overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]"><tr><th class="px-8 py-5">日期</th><th class="px-8 py-5">时段</th><th class="px-8 py-5">应到人数</th><th class="px-8 py-5">实到人数</th><th class="px-8 py-5">合计费用</th><th class="px-8 py-5">操作</th></tr></thead>
                            <tbody class="divide-y divide-gray-100">
                                ${Array.from(new Set(records.map(r => `${r.date}|${r.mealId}`))).sort().reverse().map(k => {
                                    const [d, mid] = k.split('|');
                                    const dr = records.filter(r => r.date === d && r.mealId === parseInt(mid));
                                    const cost = dr.reduce((s, r) => s + r.cost, 0);
                                    const sName = {1:'早餐', 2:'午餐', 3:'晚餐'}[mid] || '其他';
                                    return `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="px-8 py-5 font-mono text-gray-500">${d}</td>
                                            <td class="px-8 py-5 font-black text-gray-900">${sName}</td>
                                            <td class="px-8 py-5 font-bold">${dr.length}</td>
                                            <td class="px-8 py-5 font-black text-green-600">${dr.filter(r => r.isAttendance).length}</td>
                                            <td class="px-8 py-5 font-black text-gray-900">¥${cost.toFixed(1)}</td>
                                            <td class="px-8 py-5"><button data-action="renderTeacherReport" data-date="${d}" data-meal="${mid}" class="text-blue-600 font-bold hover:underline">修改记录</button></td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        const renderTeacherSettings = async () => {
            document.getElementById('page-title').textContent = '个人安全与系统设置';
            document.getElementById('header-actions').innerHTML = '';
            document.getElementById('content-area').innerHTML = `
                <div class="max-w-xl mx-auto mt-10 space-y-8">
                    <!-- 密码修改 -->
                    <div class="card p-10">
                        <div class="flex flex-col items-center text-center space-y-4 mb-10">

        // 自动上报检测逻辑 (每晚 18:00 上报明天的数据)
        const checkAndRunAutoReport = async () => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            
            const tomorrowObj = new Date();
            tomorrowObj.setDate(tomorrowObj.getDate() + 1);
            const tomorrowStr = tomorrowObj.toISOString().split('T')[0];

            if (currentHour !== 18 || currentMinute !== 0) return;

            console.log(`正在执行系统 18:00 自动上报任务 (目标日期: ${tomorrowStr})...`);

            const classes = await dbOp('classes', 'readonly', s => s.getAll());
            const students = await dbOp('students', 'readonly', s => s.getAll());
            const allRecords = await dbOp('records', 'readonly', s => s.getAll());
            const allReports = await dbOp('reports', 'readonly', s => s.getAll());
            const sessionsData = await dbOp('configs', 'readonly', s => s.get('meal_sessions'));
            const daySessions = (sessionsData?.day || []).filter(s => s.enabled);
            const residentSessions = (sessionsData?.resident || []).filter(s => s.enabled);
            const allPossibleSessions = Array.from(new Set([...daySessions, ...residentSessions].map(s => JSON.stringify({id: s.id, name: s.name}))))
                                            .map(s => JSON.parse(s));

            for (const cls of classes) {
                // 检查该班级明天是否已上报
                const isReported = allReports.some(r => r.date === tomorrowStr && r.classId === cls.id && r.status === 'reported');
                if (isReported) continue;

                const classStudents = students.filter(s => s.classId === cls.id);
                const tomorrowRecords = allRecords.filter(r => r.classId === cls.id && r.date === tomorrowStr);
                const prices = await dbOp('configs', 'readonly', s => s.get('meal_prices')) || { male: {}, female: {} };

                // 1. 为所有未记录的学生补全“正常就餐”记录
                for (const sess of allPossibleSessions) {
                    for (const student of classStudents) {
                        let isMealActive = false;
                        if (student.studentType === 'resident') {
                            isMealActive = residentSessions.some(ss => ss.id === sess.id);
                        } else if (student.studentType === 'custom') {
                            isMealActive = student.customMeals && student.customMeals[sess.id];
                        } else {
                            isMealActive = daySessions.some(ss => ss.id === sess.id);
                        }

                        if (!isMealActive) continue;

                        const existing = tomorrowRecords.find(r => r.studentId === student.id && r.mealId === sess.id);
                        if (!existing) {
                            const basePrice = (student.gender === 'male' ? prices.male[sess.id] : prices.female[sess.id]) || 0;
                            await dbOp('records', 'readwrite', s => s.add({
                                studentId: student.id,
                                classId: cls.id,
                                date: tomorrowStr,
                                mealId: sess.id,
                                statusId: 1,
                                cost: basePrice,
                                isAttendance: true
                            }));
                        }
                    }
                }

                // 重新获取补全后的记录用于聚合上报数据
                const updatedRecords = (await dbOp('records', 'readonly', s => s.getAll())).filter(r => r.classId === cls.id && r.date === tomorrowStr);

                // 2. 聚合请假数据
                const leaveDetails = [];
                let totalLeaveCount = 0;

                for (const student of classStudents) {
                    const studentLeaves = updatedRecords.filter(r => r.studentId === student.id && r.statusId !== 1);
                    if (studentLeaves.length > 0) {
                        leaveDetails.push({
                            id: student.id,
                            name: student.name,
                            studentNo: student.studentNo,
                            gender: student.gender,
                            meals: studentLeaves.map(r => allPossibleSessions.find(s => s.id === r.mealId)?.name || '未知'),
                            reason: studentLeaves.map(r => r.reason).filter(Boolean).join('; ')
                        });
                        totalLeaveCount += studentLeaves.length;
                    }
                }

                const totalCount = classStudents.length;
                const report = {
                    date: tomorrowStr,
                    classId: cls.id,
                    totalCount: totalCount,
                    leaveCount: totalLeaveCount,
                    attendedCount: updatedRecords.filter(r => r.isAttendance).length,
                    reportTime: new Date().toLocaleString() + ' (系统自动)',
                    status: 'reported',
                    leaveDetails
                };

                const existingReport = allReports.find(r => r.date === tomorrowStr && r.classId === cls.id);
                if (existingReport) report.id = existingReport.id;

                await dbOp('reports', 'readwrite', s => s.put(report));
                console.log(`班级 ${cls.name} 自动上报明日(${tomorrowStr})数据完成`);
            }

            if (currentUser && currentUser.role === 'teacher') {
                showToast(`系统已于 18:00 自动完成明日(${tomorrowStr})就餐上报`);
                if (activePage === 'teacher-report') renderTeacherReport(tomorrowStr);
            }
        };

                            y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            const deptRateCtx = document.getElementById('general-dept-rate-chart');
            if (deptRateCtx) {
                const deptRateMap = {};
                filteredClasses.forEach(cls => {
                    if (!deptRateMap[cls.department]) deptRateMap[cls.department] = { total: 0, dining: 0 };
                    const clsRecords = filteredRecords.filter(r => r.classId === cls.id);
                    deptRateMap[cls.department].total += clsRecords.length;
                    deptRateMap[cls.department].dining += clsRecords.filter(r => r.isAttendance).length;
                });
                const deptRateNames = Object.keys(deptRateMap);
                const deptRateValues = deptRateNames.map(d => deptRateMap[d].total > 0 ? (deptRateMap[d].dining / deptRateMap[d].total * 100).toFixed(1) : 0);
                new Chart(deptRateCtx, {
                    type: 'bar',
                    data: {
                        labels: deptRateNames,
                        datasets: [{
                            label: '就餐率 (%)',

                            backgroundColor: 'rgba(79, 70, 229, 0.7)',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9' }, ticks: { callback: v => v + '%' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            const mealTypeCtx = document.getElementById('general-meal-type-chart');
            if (mealTypeCtx) {
                const mealBreakfast = filteredRecords.filter(r => r.mealId === 1 && r.isAttendance).length;
                const mealLunch = filteredRecords.filter(r => r.mealId === 2 && r.isAttendance).length;
                const mealDinner = filteredRecords.filter(r => r.mealId === 3 && r.isAttendance).length;
                const mealTotal = mealBreakfast + mealLunch + mealDinner;
                new Chart(mealTypeCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['早餐', '午餐', '晚餐'],
                        datasets: [{
                            data: [
                                mealTotal > 0 ? (mealBreakfast / mealTotal * 100).toFixed(1) : 0,
                                mealTotal > 0 ? (mealLunch / mealTotal * 100).toFixed(1) : 0,
                                mealTotal > 0 ? (mealDinner / mealTotal * 100).toFixed(1) : 0
                            ],
                            backgroundColor: ['rgba(37, 99, 235, 0.8)', 'rgba(79, 70, 229, 0.8)', 'rgba(147, 51, 234, 0.8)']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed}%` } }
                        }
                    }
                });
            }

            const deptStudentCtx = document.getElementById('general-dept-student-chart');
            if (deptStudentCtx) {
                const deptStudentMap = {};
                filteredClasses.forEach(cls => {
                    if (!deptStudentMap[cls.department]) deptStudentMap[cls.department] = 0;
                    deptStudentMap[cls.department] += students.filter(s => s.classId === cls.id).length;
                });
                const deptStudentNames = Object.keys(deptStudentMap);
                const deptStudentValues = deptStudentNames.map(d => deptStudentMap[d]);
                new Chart(deptStudentCtx, {
                    type: 'pie',
                    data: {
                        labels: deptStudentNames,
                        datasets: [{
                            data: deptStudentValues,
                            backgroundColor: ['rgba(37, 99, 235, 0.8)', 'rgba(79, 70, 229, 0.8)', 'rgba(147, 51, 234, 0.8)', 'rgba(6, 182, 212, 0.8)', 'rgba(16, 185, 129, 0.8)']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }

            document.getElementById('general-period-select').addEventListener('change', (e) => {
                renderGeneralOverview(e.target.value, document.getElementById('general-dept-select').value);
            });
            document.getElementById('general-dept-select').addEventListener('change', (e) => {
                renderGeneralOverview(document.getElementById('general-period-select').value, e.target.value);
            });
        };

        const renderGeneralRanking = async (period = 'thisMonth', deptFilter = 'all', sortBy = 'cost', sortOrder = 'desc') => {
            const classes = await dbOp('classes', 'readonly', s => s.getAll()) || [];
            const students = await dbOp('students', 'readonly', s => s.getAll()) || [];
            const records = await dbOp('records', 'readonly', s => s.getAll()) || [];
            const departments = await dbOp('departments', 'readonly', s => s.getAll()) || [];

            const today = new Date();
            let startDate, endDate;
            if (period === 'thisMonth') {
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                endDate = today;
            } else if (period === 'lastMonth') {
                startDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                endDate = new Date(today.getFullYear(), today.getMonth(), 0);
            } else {
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                endDate = today;
            }
            const startStr = startDate.toISOString().split('T')[0];
            const endStr = endDate.toISOString().split('T')[0];

            let filteredClasses = classes;
            if (deptFilter !== 'all') {
                filteredClasses = classes.filter(c => c.department === deptFilter);
            }
            const filteredClassIds = filteredClasses.map(c => c.id);
            const filteredRecords = records.filter(r => filteredClassIds.includes(r.classId) && r.date >= startStr && r.date <= endStr);

            const classData = filteredClasses.map(c => {
                const cStudents = students.filter(s => s.classId === c.id);
                const cRecords = filteredRecords.filter(r => r.classId === c.id);
                const mIds = cStudents.filter(s => s.gender === 'male').map(s => s.id);
                const fIds = cStudents.filter(s => s.gender === 'female').map(s => s.id);
                const mC = cRecords.filter(r => mIds.includes(r.studentId)).reduce((s, r) => s + (r.cost || 0), 0);
                const fC = cRecords.filter(r => fIds.includes(r.studentId)).reduce((s, r) => s + (r.cost || 0), 0);
                const totalMeals = cRecords.filter(r => r.isAttendance).length;
                const rate = cRecords.length ? (cRecords.filter(r => r.isAttendance).length / cRecords.length * 100) : 0;

                return {
                    id: c.id,
                    fullName: c.fullName || c.name,
                    department: c.department || '',
                    grade: c.grade || '',
                    classNumber: c.classNumber || 0,
                    totalCost: mC + fC,
                    totalMeals,
                    attendanceRate: rate
                };
            });

            if (sortBy === 'cost') {
                classData.sort((a, b) => sortOrder === 'desc' ? b.totalCost - a.totalCost : a.totalCost - b.totalCost);
            } else if (sortBy === 'meals') {
                classData.sort((a, b) => sortOrder === 'desc' ? b.totalMeals - a.totalMeals : a.totalMeals - b.totalMeals);
            } else if (sortBy === 'attendance') {
                classData.sort((a, b) => sortOrder === 'desc' ? b.attendanceRate - a.attendanceRate : a.attendanceRate - b.attendanceRate);
            } else {
                const gradeOrder = { '高一': 1, '高二': 2, '高三': 3 };
                classData.sort((a, b) => {
                    if (a.department !== b.department) return a.department.localeCompare(b.department);
                    const ga = gradeOrder[a.grade] || 999;
                    const gb = gradeOrder[b.grade] || 999;
                    if (ga !== gb) return ga - gb;
                    return a.classNumber - b.classNumber;
                });
            }

            document.getElementById('page-title').textContent = '班级消费排行';
            document.getElementById('header-actions').innerHTML = `
                <div class="flex items-center space-x-3">
                    <select id="general-ranking-period" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                        <option value="thisMonth" ${period === 'thisMonth' ? 'selected' : ''}>本月</option>
                        <option value="lastMonth" ${period === 'lastMonth' ? 'selected' : ''}>上月</option>
                    </select>
                    <select id="general-ranking-dept" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                        <option value="all">全部系部</option>
                        ${departments.map(d => `<option value="${d.name}" ${deptFilter === d.name ? 'selected' : ''}>${d.name}</option>`).join('')}
                    </select>
                    <select id="general-ranking-sort" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                        <option value="class" ${sortBy === 'class' ? 'selected' : ''}>按班级顺序</option>
                        <option value="cost" ${sortBy === 'cost' ? 'selected' : ''}>按消费金额</option>
                        <option value="meals" ${sortBy === 'meals' ? 'selected' : ''}>按就餐人次</option>
                        <option value="attendance" ${sortBy === 'attendance' ? 'selected' : ''}>按出勤率</option>
                    </select>
                    <select id="general-ranking-order" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                        <option value="desc" ${sortOrder === 'desc' ? 'selected' : ''}>降序</option>
                        <option value="asc" ${sortOrder === 'asc' ? 'selected' : ''}>升序</option>
                    </select>
                </div>
            `;

            document.getElementById('content-area').innerHTML = `
                <div class="space-y-6 pb-20">
                    <div class="card overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]">
                                <tr>
                                    <th class="px-8 py-5">排名</th>
                                    <th class="px-8 py-5">班级</th>
                                    <th class="px-8 py-5">总消费金额</th>
                                    <th class="px-8 py-5">总就餐人次</th>
                                    <th class="px-8 py-5">出勤率</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${classData.length === 0 ? `
                                    <tr><td colspan="5" class="px-8 py-10 text-center text-gray-400">
                                        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                                        <p class="text-lg font-black">暂无数据</p>
                                    </td></tr>
                                ` : classData.map((c, i) => `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="px-8 py-5 font-black ${i < 3 ? 'text-amber-600' : 'text-gray-400'}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td>
                                        <td class="px-8 py-5 font-black text-gray-900">${c.fullName}</td>
                                        <td class="px-8 py-5 font-black text-green-600">¥${c.totalCost.toFixed(2)}</td>
                                        <td class="px-8 py-5 font-bold text-gray-700">${c.totalMeals}</td>
                                        <td class="px-8 py-5">
                                            <div class="flex items-center space-x-2 font-black text-green-600">
                                                <span>${c.attendanceRate.toFixed(1)}%</span>
                                                <div class="w-12 h-1 bg-gray-100 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width: ${c.attendanceRate}%"></div></div>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();

            document.getElementById('general-ranking-period').addEventListener('change', (e) => {
                renderGeneralRanking(e.target.value, document.getElementById('general-ranking-dept').value, document.getElementById('general-ranking-sort').value, document.getElementById('general-ranking-order').value);
            });
            document.getElementById('general-ranking-dept').addEventListener('change', (e) => {
                renderGeneralRanking(document.getElementById('general-ranking-period').value, e.target.value, document.getElementById('general-ranking-sort').value, document.getElementById('general-ranking-order').value);
            });
            document.getElementById('general-ranking-sort').addEventListener('change', (e) => {
                renderGeneralRanking(document.getElementById('general-ranking-period').value, document.getElementById('general-ranking-dept').value, e.target.value, document.getElementById('general-ranking-order').value);
            });
            document.getElementById('general-ranking-order').addEventListener('change', (e) => {
                renderGeneralRanking(document.getElementById('general-ranking-period').value, document.getElementById('general-ranking-dept').value, document.getElementById('general-ranking-sort').value, e.target.value);
            });
        };

        const renderGeneralCompare = async (compareType = 'time', timeRange = 'todayVsYesterday', classA = '', classB = '', deptA = '', deptB = '') => {
            const classes = await dbOp('classes', 'readonly', s => s.getAll()) || [];
            const students = await dbOp('students', 'readonly', s => s.getAll()) || [];
            const records = await dbOp('records', 'readonly', s => s.getAll()) || [];
            const departments = await dbOp('departments', 'readonly', s => s.getAll()) || [];

            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            const calcMetrics = (recs) => {
                const totalRevenue = recs.reduce((s, r) => s + (r.cost || 0), 0);
                const totalMeals = recs.filter(r => r.isAttendance).length;
                const attendanceRate = recs.length ? (recs.filter(r => r.isAttendance).length / recs.length * 100) : 0;
                const uniqueStudents = new Set(recs.filter(r => r.isAttendance).map(r => r.studentId)).size;
                const avgPerPerson = uniqueStudents > 0 ? totalRevenue / uniqueStudents : 0;
                return { totalRevenue, totalMeals, attendanceRate, avgPerPerson };
            };

            let dataA, dataB, labelA, labelB;

            if (compareType === 'time') {
                let recsA, recsB;
                if (timeRange === 'todayVsYesterday') {
                    recsA = records.filter(r => r.date === todayStr);
                    recsB = records.filter(r => r.date === yesterdayStr);
                    labelA = '今日'; labelB = '昨日';
                } else if (timeRange === 'thisWeekVsLastWeek') {
                    const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
                    const lastWeekStart = new Date(weekStart); lastWeekStart.setDate(weekStart.getDate() - 7);
                    const lastWeekEnd = new Date(weekStart); lastWeekEnd.setDate(weekStart.getDate() - 1);
                    recsA = records.filter(r => r.date >= weekStart.toISOString().split('T')[0] && r.date <= todayStr);
                    recsB = records.filter(r => r.date >= lastWeekStart.toISOString().split('T')[0] && r.date <= lastWeekEnd.toISOString().split('T')[0]);
                    labelA = '本周'; labelB = '上周';
                } else {
                    const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                    const lastMonthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1).toISOString().split('T')[0];
                    const lastMonthEnd = new Date(today.getFullYear(), today.getMonth(), 0).toISOString().split('T')[0];
                    recsA = records.filter(r => r.date >= thisMonthStart && r.date <= todayStr);
                    recsB = records.filter(r => r.date >= lastMonthStart && r.date <= lastMonthEnd);
                    labelA = '本月'; labelB = '上月';
                }
                dataA = calcMetrics(recsA);
                dataB = calcMetrics(recsB);
            } else if (compareType === 'class') {
                const classAObj = classes.find(c => c.id === parseInt(classA));
                const classBObj = classes.find(c => c.id === parseInt(classB));
                const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                const recsA = records.filter(r => r.classId === parseInt(classA) && r.date >= thisMonthStart && r.date <= todayStr);
                const recsB = records.filter(r => r.classId === parseInt(classB) && r.date >= thisMonthStart && r.date <= todayStr);
                labelA = classAObj?.fullName || '班级A'; labelB = classBObj?.fullName || '班级B';
                dataA = calcMetrics(recsA);
                dataB = calcMetrics(recsB);
            } else {
                const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                const deptAClassIds = classes.filter(c => c.department === deptA).map(c => c.id);
                const deptBClassIds = classes.filter(c => c.department === deptB).map(c => c.id);
                const recsA = records.filter(r => deptAClassIds.includes(r.classId) && r.date >= thisMonthStart && r.date <= todayStr);
                const recsB = records.filter(r => deptBClassIds.includes(r.classId) && r.date >= thisMonthStart && r.date <= todayStr);
                labelA = deptA || '系部A'; labelB = deptB || '系部B';
                dataA = calcMetrics(recsA);
                dataB = calcMetrics(recsB);
            }

            const calcChange = (a, b) => {
                if (b === 0) return a > 0 ? 100 : 0;
                return ((a - b) / b * 100).toFixed(1);
            };

            document.getElementById('page-title').textContent = '对比分析';
            document.getElementById('header-actions').innerHTML = `
                <div class="flex items-center space-x-3">
                    <select id="general-compare-type" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                        <option value="time" ${compareType === 'time' ? 'selected' : ''}>时间对比</option>
                        <option value="class" ${compareType === 'class' ? 'selected' : ''}>班级对比</option>
                        <option value="dept" ${compareType === 'dept' ? 'selected' : ''}>系部对比</option>
                    </select>
                    <div id="general-compare-options">
                        ${compareType === 'time' ? `
                            <select id="general-compare-time" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                                <option value="todayVsYesterday" ${timeRange === 'todayVsYesterday' ? 'selected' : ''}>今日 vs 昨日</option>
                                <option value="thisWeekVsLastWeek" ${timeRange === 'thisWeekVsLastWeek' ? 'selected' : ''}>本周 vs 上周</option>
                                <option value="thisMonthVsLastMonth" ${timeRange === 'thisMonthVsLastMonth' ? 'selected' : ''}>本月 vs 上月</option>
                            </select>
                        ` : compareType === 'class' ? `
                            <select id="general-compare-classA" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                                ${classes.map(c => `<option value="${c.id}" ${classA === String(c.id) ? 'selected' : ''}>${c.fullName || c.name}</option>`).join('')}
                            </select>
                            <span class="text-gray-400 font-bold">vs</span>
                            <select id="general-compare-classB" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                                ${classes.map(c => `<option value="${c.id}" ${classB === String(c.id) ? 'selected' : ''}>${c.fullName || c.name}</option>`).join('')}
                            </select>
                        ` : `
                            <select id="general-compare-deptA" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                                ${departments.map(d => `<option value="${d.name}" ${deptA === d.name ? 'selected' : ''}>${d.name}</option>`).join('')}
                            </select>
                            <span class="text-gray-400 font-bold">vs</span>
                            <select id="general-compare-deptB" class="font-black text-sm px-3 py-2 rounded-xl border border-gray-200 bg-white">
                                ${departments.map(d => `<option value="${d.name}" ${deptB === d.name ? 'selected' : ''}>${d.name}</option>`).join('')}
                            </select>
                        `}
                    </div>
                </div>
            `;

            const metrics = [
                { name: '总消费金额', a: dataA.totalRevenue, b: dataB.totalRevenue, prefix: '¥', suffix: '' },
                { name: '总就餐人次', a: dataA.totalMeals, b: dataB.totalMeals, prefix: '', suffix: '人次' },
                { name: '人均消费', a: dataA.avgPerPerson, b: dataB.avgPerPerson, prefix: '¥', suffix: '' },
                { name: '出勤率', a: dataA.attendanceRate, b: dataB.attendanceRate, prefix: '', suffix: '%' }
            ];

            document.getElementById('content-area').innerHTML = `
                <div class="space-y-10 pb-20">
                    <div class="card p-8">
                        <div style="height: 300px; position: relative;">
                            <canvas id="general-compare-chart"></canvas>
                        </div>
                    </div>

                    <div class="card overflow-hidden">
                        <div class="px-8 py-6 border-b bg-gray-50/50">
                            <h4 class="font-black text-gray-900">对比详情：${labelA} vs ${labelB}</h4>
                        </div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]">
                                <tr>
                                    <th class="px-8 py-5">指标</th>
                                    <th class="px-8 py-5">${labelA}</th>
                                    <th class="px-8 py-5">${labelB}</th>
                                    <th class="px-8 py-5">变化</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${metrics.map(m => {
                                    const change = calcChange(m.a, m.b);
                                    const isUp = parseFloat(change) >= 0;
                                    return `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="px-8 py-5 font-black text-gray-900">${m.name}</td>
                                            <td class="px-8 py-5 font-bold text-gray-700">${m.prefix}${m.a.toFixed ? m.a.toFixed(2) : m.a}${m.suffix}</td>
                                            <td class="px-8 py-5 font-bold text-gray-700">${m.prefix}${m.b.toFixed ? m.b.toFixed(2) : m.b}${m.suffix}</td>
                                            <td class="px-8 py-5 font-black ${isUp ? 'text-green-600' : 'text-rose-600'}">${isUp ? '↑' : '↓'} ${Math.abs(change)}%</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();

            const ctx = document.getElementById('general-compare-chart');
            if (ctx) {
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: metrics.map(m => m.name),
                        datasets: [
                            {
                                label: labelA,
                                data: [dataA.totalRevenue, dataA.totalMeals, dataA.avgPerPerson, dataA.attendanceRate],
                                backgroundColor: 'rgba(37, 99, 235, 0.7)',
                                borderRadius: 6
                            },
                            {
                                label: labelB,
                                data: [dataB.totalRevenue, dataB.totalMeals, dataB.avgPerPerson, dataB.attendanceRate],
                                backgroundColor: 'rgba(249, 115, 22, 0.7)',
                                borderRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            document.getElementById('general-compare-type').addEventListener('change', (e) => {
                const type = e.target.value;
                if (type === 'time') renderGeneralCompare('time', 'todayVsYesterday');
                else if (type === 'class') renderGeneralCompare('class', '', classes[0]?.id?.toString() || '', classes.length > 1 ? classes[1]?.id?.toString() : '');
                else renderGeneralCompare('dept', '', '', '', departments[0]?.name || '', departments.length > 1 ? departments[1]?.name : '');
            });

            const timeSelect = document.getElementById('general-compare-time');
            if (timeSelect) {
                timeSelect.addEventListener('change', (e) => renderGeneralCompare('time', e.target.value));
            }
            const classASelect = document.getElementById('general-compare-classA');
            const classBSelect = document.getElementById('general-compare-classB');
            if (classASelect) classASelect.addEventListener('change', (e) => renderGeneralCompare('class', '', e.target.value, classBSelect.value));

                if (!target) return;
                
                const action = target.getAttribute('data-action');
                const id = target.getAttribute('data-id');
                const cid = target.getAttribute('data-cid');
                const sid = target.getAttribute('data-sid');
                const date = target.getAttribute('data-date');

                    e.preventDefault();

                switch (action) {
                    // 系统通用
                    case 'closeModal': closeModal(); break;
                    case 'handleLogout': handleLogout(); break;

                    case 'addNewSession': addNewSession(type); break;

                    // 总务端功能
                    case 'applyGeneralDetailFilter': applyGeneralDetailFilter(); break;
                    case 'exportGeneralDetailCSV': exportGeneralDetailCSV(); break;
                    case 'renderDiningStats': renderDiningStats(); break;
                    case 'renderDepartmentManagement': renderDepartmentManagement(); break;
                    case 'addDepartmentFromGeneral': addDepartmentFromGeneral(); break;
                    case 'confirmAddDeptGeneral': confirmAddDeptGeneral(); break;
                    case 'viewDeptDetails': viewDeptDetails(target.getAttribute('data-dept')); break;
                    case 'exportDiningStats': exportDiningStats(); break;
                    case 'exportDepartmentManagement': exportDepartmentManagement(); break;
                    case 'exportGeneralOverview': exportGeneralOverview(); break;
                    case 'savePricingSettings': savePricingSettings(); break;
                    case 'resetDeptPricing': {
                        const resetDept = target.getAttribute('data-dept');
                        const basePrices = await dbOp('configs', 'readonly', s => s.get('meal_prices')) || { breakfast: 5, lunch: 10, dinner: 8 };
                        document.querySelectorAll(`.dept-pricing-input[data-dept="${resetDept}"]`).forEach(input => {
                            const meal = input.getAttribute('data-meal');
                            input.value = basePrices[meal];
                        });
                        showToast(`已重置${resetDept}价格为标准价格`);
                        break;
                    }
                    case 'showReceiverReportDetail': showReceiverReportDetail(parseInt(id)); break;
                    case 'exportReceiverCSV': exportReceiverCSV(); break;
                    case 'switchReceiverDate': {
                        const switchDate = target.getAttribute('data-date');
                        if (switchDate) renderReceiverHome(switchDate);
                        break;
                    }
                    case 'applyDateRange': {
                        const startDate = document.getElementById('receiver-stats-start').value;
                        const endDate = document.getElementById('receiver-stats-end').value;
                        renderReceiverStats({ start: startDate, end: endDate });
                        break;
                    }
                    // 接收端班级全览操作
                    case 'toggleReceiverDepartment': {
                        const dept = target.getAttribute('data-dept');
                        const content = document.getElementById(`receiver-dept-content-${dept}`);
                        const icon = document.getElementById(`receiver-dept-icon-${dept}`);
                        if (content && icon) {
                            if (content.classList.contains('hidden')) {
                                content.classList.remove('hidden');
                                icon.style.transform = 'rotate(0deg)';
                            } else {
                                content.classList.add('hidden');
                                icon.style.transform = 'rotate(-90deg)';
                            }
                        }
                        break;
                    }
                    case 'selectReceiverClass': {
                        currentReceiverClassId = parseInt(id);
                        renderReceiverClasses();
                        break;
                    }
                    case 'showReceiverRejectModal': {
                        showReceiverRejectModal(parseInt(id));
                        break;
                    }
                    case 'handleReceiverRejectReport': {
                        handleReceiverRejectReport(parseInt(id));
                        break;
                    }
                    case 'openReceiverMealEdit': openReceiverMealEdit(parseInt(target.getAttribute('data-class-id')), target.getAttribute('data-class-name'), parseInt(target.getAttribute('data-breakfast')||0), parseInt(target.getAttribute('data-lunch')||0), parseInt(target.getAttribute('data-dinner')||0)); break;
                    case 'submitReceiverMealEdit': submitReceiverMealEdit(parseInt(target.getAttribute('data-class-id'))); break;
                    case 'exportReceiverExcel': exportReceiverExcel(); break;
                    case 'switchReceiverAggDim': {
                        const dim = target.getAttribute('data-dim');
                        const startEl = document.getElementById('receiver-stats-start');
                        const endEl = document.getElementById('receiver-stats-end');
                        renderReceiverStats({ start: startEl?.value, end: endEl?.value }, 'class', 'asc', dim);
                        break;
                    }
                    case 'exportCSV': exportCSV(type, month); break;
                    case 'exportJSON': exportJSON(); break;
                    case 'triggerImport': document.getElementById('import-input').click(); break;
                    
                    // 班主任操作
                    case 'renderTeacherReport': renderTeacherReport(date, meal); break;
                    case 'toggleMealStatus': toggleMealStatus(parseInt(sid), date, parseInt(meal), leave); break;
                    case 'handleBatchLeave': handleBatchLeave(date, parseInt(meal), gender, type); break;
                    case 'handleManualReport': handleManualReport(date); break;
                    
                    // 管理员端上报记录视图控制
                    case 'resetAdminReportView': 
                        adminReportViewDate = null; 
                        renderAdminReports(); 
                        break;
                }
            });

            // 监听 input 和 change 事件
            document.body.addEventListener('change', (e) => {
                const id = e.target.id;
                if (id === 'report-date-input' || id === 'report-meal-input') {
                    const date = document.getElementById('report-date-input').value;
                    const meal = document.getElementById('report-meal-input').value;
                    renderTeacherReport(date, meal);
                }
                if (id === 'admin-report-date-picker') {
                    adminReportViewDate = e.target.value;
                    renderAdminReports(e.target.value);
                }
                if (id === 'records-month-input') {
                    renderTeacherRecords(e.target.value);
                }
                if (id === 'import-input') {
                    importJSON(e.target);
                }
                if (id === 'receiver-date-picker') {
                    renderReceiverHome(e.target.value);
                }
            });

            document.body.addEventListener('input', (e) => {
                if (e.target.id === 'class-search-input') {
                    handleClassSearch(e.target.value);
                }
            });
        };

        // 启动
        window.onload = async () => { 
            await initDB(); 
            await seedInitialData(); 
            document.getElementById('login-form').onsubmit = handleLogin; 
            setupEventListeners(); // 初始化事件委托
            lucide.createIcons(); 
            
            // 启动自动上报检测计时器（每分钟执行一次）
            setInterval(checkAndRunAutoReport, 60000);
            // 启动时立即检查一次
            checkAndRunAutoReport();
        };
    </script>
</body>
</html>
